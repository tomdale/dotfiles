# External files managed by chezmoi
# https://www.chezmoi.io/reference/special-files-and-directories/chezmoiexternal-format/

# Glow solarized dark theme
[".config/glow/solarized-dark.json"]
    type = "file"
    url = "https://raw.githubusercontent.com/tomdale/glow-glamour-solarized/main/solarized-dark.json"
    refreshPeriod = "168h"

# zsh-transient-prompt - oh-my-zsh custom plugin
[".config/zsh/custom/plugins/transient-prompt"]
    type = "archive"
    url = "https://github.com/olets/zsh-transient-prompt/archive/refs/heads/main.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"

# fasd - frecency-based file/directory navigation
[".local/bin/fasd"]
    type = "file"
    url = "https://github.com/whjvenyl/fasd/releases/latest/download/fasd"
    refreshPeriod = "168h"
    executable = true

