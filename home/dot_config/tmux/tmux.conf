# Tmux configuration (XDG paths)

# Set XDG-compliant plugin path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# ───────────────────────────────────────────────────────────────────────────────
# tmux-pain-control keybindings (added by plugin, not visible in prefix ?)
# ───────────────────────────────────────────────────────────────────────────────
# Navigation:    prefix h/j/k/l       - move between panes (vim-style)
#                prefix C-h/j/k/l     - move between panes (hold ctrl)
# Resizing:      prefix H/J/K/L       - resize pane in direction
# Splitting:     prefix |             - split vertically
#                prefix \             - split vertically (full width)
#                prefix -             - split horizontally
#                prefix _             - split horizontally (full height)
# Windows:       prefix < / >         - move window left/right
# New window:    prefix c             - new window (inherits current path)

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.local/share/tmux/plugins/tpm/tpm'
